server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_knowledge?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456      # ← 改成你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

file:
  upload-dir: ./uploads

jwt:
  secret: AiKnowledgeBaseSecretKey2026ThisIsAVeryLongKeyForHS256Algorithm
  expiration: 86400000